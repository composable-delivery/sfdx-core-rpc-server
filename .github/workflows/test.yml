name: tests
on:
  push:
    branches-ignore: [main]
  workflow_dispatch:

jobs:
  yarn-lockfile-check:
    uses: salesforcecli/github-workflows/.github/workflows/lockFileCheck.yml@main
  # Since the Windows unit tests take much longer, we run the linux unit tests first and then run the windows unit tests in parallel with NUTs
 

  generate-schemas:
    needs: yarn-lockfile-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Install dependencies
        run: yarn install

      - name: Generate JSON schema
        run: node scripts/generateJsonSchema.ts

      - name: Generate OpenAPI schema
        run: node scripts/generateOpenApiSchema.ts

      - name: Upload JSON schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-schema
          path: rpcSchema.json

      - name: Upload OpenAPI schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: openApiSchema.json

  test-python-anyio-client:
    needs: generate-schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anyio httpx pydantic

      - name: Run AnyIO client tests
        run: python test/python/test_anyio_client.py
